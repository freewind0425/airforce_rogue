<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Project Airforce Rogue - Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050b14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: #050b14;
            border-left: 1px solid #1a2638;
            border-right: 1px solid #1a2638;
            overflow: hidden;
        }
        /* Top HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            padding: 10px 20px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(5,11,20,1), rgba(5,11,20,0));
        }
        #stage-info {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }
        #boss-bar-container {
            width: 260px;
            height: 10px;
            background-color: #222222;
            border-radius: 5px;
            margin: 0 auto 8px auto;
            overflow: hidden;
            border: 1px solid #333333;
        }
        #boss-bar {
            width: 100%;
            height: 100%;
            background-color: #ff4757;
            transition: width 0.1s linear;
        }
        #xp-bar-container {
            width: 100%;
            height: 8px;
            background-color: #111111;
            border-radius: 4px;
            overflow: hidden;
        }
        #xp-bar {
            width: 0%;
            height: 100%;
            background-color: #00ffcc;
            transition: width 0.2s ease-out;
        }
        /* Play Field Canvas */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Modal / Popups */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 25px;
            text-align: center;
        }
        .card {
            width: 100%;
            max-width: 340px;
            height: 105px;
            background-color: #111a2e;
            border: 2px solid #34495e;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.1s ease, border-color 0.1s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card:active {
            transform: scale(0.95);
            border-color: #00ffcc;
        }
        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 12px;
            color: #cccccc;
            line-height: 1.4;
        }
        /* Game Over / Garage Screen */
        #gameover-screen {
            background-color: #050b14;
        }
        .gold-display {
            font-size: 32px;
            font-weight: bold;
            color: #ffea00;
            margin-bottom: 10px;
            text-align: center;
        }
        .stats-shop {
            width: 100%;
            max-width: 340px;
            margin-bottom: 30px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #111a2e;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #1a2638;
        }
        .shop-info {
            display: flex;
            flex-direction: column;
        }
        .shop-name {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }
        .shop-level {
            font-size: 11px;
            color: #aaa;
            margin-top: 2px;
        }
        .btn-upgrade {
            background-color: #ffea00;
            color: #050b14;
            border: none;
            padding: 8px 14px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-upgrade:disabled {
            background-color: #333;
            color: #777;
        }
        .btn-action {
            width: 220px;
            height: 52px;
            background-color: #00ffcc;
            color: #050b14;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 4px 14px rgba(0, 255, 204, 0.3);
        }
        .btn-action:active {
            transform: scale(0.95);
        }
        /* Info Overlay for Control Guide */
        #guide-overlay {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #55667c;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- HUD -->
    <div id="hud">
        <div id="stage-info">STAGE 1</div>
        <div id="boss-bar-container"><div id="boss-bar"></div></div>
        <div id="xp-bar-container"><div id="xp-bar"></div></div>
    </div>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>
    <div id="guide-overlay">비행기는 적을 향해 가로축으로 자동 보정 이동 및 사격합니다</div>

    <!-- Rogue Skill Choice Modal -->
    <div id="level-modal" class="modal">
        <div class="modal-title">강화 스킬 선택</div>
        <div id="card-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <!-- Cards populated dynamically -->
        </div>
    </div>

    <!-- Game Over & Meta Progression Garage Modal -->
    <div id="gameover-screen" class="modal">
        <div class="modal-title" style="color: #ff4757; margin-bottom: 5px;">기체 파괴됨</div>
        <div style="font-size: 14px; color: #aaa; margin-bottom: 20px;">격납고 정산 및 기구 영구 강화</div>
        
        <div class="gold-display" id="total-gold">0 G</div>
        
        <div class="stats-shop">
            <div class="shop-item">
                <div class="shop-info">
                    <span class="shop-name">공격력 강화 (+5)</span>
                    <span class="shop-level" id="lvl-atk">Lv.1</span>
                </div>
                <button class="btn-upgrade" id="btn-buy-atk" onclick="buyMeta('atk')">500 G</button>
            </div>
            <div class="shop-item">
                <div class="shop-info">
                    <span class="shop-name">장갑 내구도 (+50)</span>
                    <span class="shop-level" id="lvl-hp">Lv.1</span>
                </div>
                <button class="btn-upgrade" id="btn-buy-hp" onclick="buyMeta('hp')">400 G</button>
            </div>
        </div>

        <button class="btn-action" onclick="restartGame()">다시 출격하기</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI elements
    const xpBar = document.getElementById('xp-bar');
    const bossBar = document.getElementById('boss-bar');
    const stageInfo = document.getElementById('stage-info');
    const levelModal = document.getElementById('level-modal');
    const cardList = document.getElementById('card-list');
    const gameoverScreen = document.getElementById('gameover-screen');
    const totalGoldDisplay = document.getElementById('total-gold');

    // Canvas Size Setup
    function resize() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- GAME DATA & STATE ---
    let gameState = 'PLAY'; // PLAY, LEVEL_UP, GAMEOVER
    let stage = 1;
    let score = 0;
    let goldEarned = 0;
    
    // Meta Progression (Saved in memory for prototype)
    let meta = {
        atkLevel: 1,
        hpLevel: 1,
        gold: 1000
    };

    // Player Object
    let player = {
        x: canvas.width / 2,
        y: canvas.height - 120,
        width: 45,
        height: 40,
        speed: 2.2, // Auto side tracking speed
        hp: 100,
        maxHp: 100,
        xp: 0,
        nextXp: 100,
        baseAtk: 15,
        atkSpeed: 300, // ms
        lastShot: 0
    };

    // In-game Skill Inventory
    let skills = {
        SK_BULLET_01: 1, // 유도 미사일 (Start at 1)
        SK_BULLET_02: 0, // 레이저 빔
        SK_BUFF_01: 0,   // 과부하 체인
        SK_BUFF_02: 0,   // 플라즈마 실드
        EV_WEAPON_01: 0, // 클러스터 미사일 (진화)
        EV_WEAPON_02: 0, // 프리즘 레이저 (진화)
        EV_WEAPON_03: 0  // 네메시스 실드 (진화)
    };

    // Entities lists
    let playerBullets = [];
    let enemies = [];
    let enemyBullets = [];
    let particles = [];
    let shieldAngle = 0;

    // Apply Meta upgrades to player base stats
    function initPlayerStats() {
        player.maxHp = 100 + (meta.hpLevel - 1) * 50;
        player.hp = player.maxHp;
        player.baseAtk = 15 + (meta.atkLevel - 1) * 5;
        player.xp = 0;
        player.nextXp = 100;
        
        // Reset skills per run
        skills = { SK_BULLET_01: 1, SK_BULLET_02: 0, SK_BUFF_01: 0, SK_BUFF_02: 0, EV_WEAPON_01: 0, EV_WEAPON_02: 0, EV_WEAPON_03: 0 };
        playerBullets = [];
        enemies = [];
        enemyBullets = [];
        particles = [];
        stage = 1;
        goldEarned = 0;
    }

    // --- SYSTEMS & LOGIC ---

    // Spawn Enemy Wave
    let lastSpawn = 0;
    let spawnInterval = 1800; // ms

    function spawnEnemy() {
        if (gameState !== 'PLAY') return;
        
        // Randomly spawn regular or chunkier bomber
        let isBomber = Math.random() > 0.75;
        let enemyType = isBomber ? 'BOMBER' : 'SCOUT';
        
        enemies.push({
            id: Math.random().toString(),
            x: Math.random() * (canvas.width - 60) + 30,
            y: -40,
            width: isBomber ? 55 : 35,
            height: isBomber ? 45 : 35,
            hp: isBomber ? 60 + stage * 20 : 20 + stage * 5,
            maxHp: isBomber ? 60 + stage * 20 : 20 + stage * 5,
            type: enemyType,
            speed: isBomber ? 0.6 : 1.2,
            lastShot: 0,
            shotInterval: isBomber ? 2000 : 3000
        });
    }

    // Auto Targeting & Firing
    function handlePlayerCombat(now) {
        if (enemies.length > 0) {
            // Core Spec: Compare X coord with enemies[0] and smoothly trace
            let target = enemies[0];
            let diffX = target.x - player.x;
            if (Math.abs(diffX) > 4) {
                player.x += Math.sign(diffX) * player.speed;
            }
        } else {
            // Return to center if no enemy
            let diffX = (canvas.width / 2) - player.x;
            if (Math.abs(diffX) > 4) player.x += Math.sign(diffX) * 1.0;
        }

        // Auto Fire Trigger
        if (now - player.lastShot > player.atkSpeed) {
            firePlayerWeapons();
            player.lastShot = now;
        }
    }

    function firePlayerWeapons() {
        // 1. Check Evolution 1 (Cluster Missile)
        if (skills.EV_WEAPON_01 > 0) {
            playerBullets.push({ x: player.x, y: player.y, type: 'CLUSTER', damage: player.baseAtk * 2.5, vx: 0, vy: -6 });
        } else if (skills.SK_BULLET_01 > 0) {
            // Standard Homing Missiles (fires count based on level)
            let count = skills.SK_BULLET_01;
            for (let i = 0; i < count; i++) {
                let spreadX = (i - (count - 1) / 2) * 12;
                playerBullets.push({ x: player.x + spreadX, y: player.y, type: 'MISSILE', damage: player.baseAtk, vx: spreadX * 0.1, vy: -5 });
            }
        }

        // 2. Continuous Prism Laser or Base Laser
        if (skills.EV_WEAPON_02 > 0) {
            playerBullets.push({ x: player.x, y: player.y - 20, type: 'PRISM_LASER', damage: player.baseAtk * 0.4, width: 14 });
        } else if (skills.SK_BULLET_02 > 0) {
            let dmgMultiplier = 1.2 + (skills.SK_BULLET_02 - 1) * 0.3;
            playerBullets.push({ x: player.x, y: player.y - 20, type: 'BASE_LASER', damage: player.baseAtk * dmgMultiplier * 0.2, width: 6 });
        }
    }

    // Trigger Synergy Modal
    function triggerLevelUp() {
        gameState = 'LEVEL_UP';
        levelModal.style.display = 'flex';
        
        // Build 3 randomized skill cards based on current spec matrix
        cardList.innerHTML = '';
        let availablePool = [];

        // Check Evolution combinations
        if (skills.SK_BULLET_01 === 5 && skills.SK_BUFF_01 >= 1 && skills.EV_WEAPON_01 === 0) {
            availablePool.push({ id: 'EV_WEAPON_01', name: '★진화★ 클러스터 미사일', desc: '유도탄이 거대화되며 적중 시 4개 파편 미사일 분열 폭발!' });
        }
        if (skills.SK_BULLET_02 === 5 && skills.SK_BULLET_01 >= 1 && skills.EV_WEAPON_02 === 0) {
            availablePool.push({ id: 'EV_WEAPON_02', name: '★진화★ 프리즘 레이저', desc: '초고출력 화이트 코어 관통 레이저 조사. 적 몸체 사이를 도탄 연쇄 번개!' });
        }

        // Regular skills
        if (skills.SK_BULLET_01 < 5 && skills.EV_WEAPON_01 === 0) availablePool.push({ id: 'SK_BULLET_01', name: `유도 미사일 Lv.${skills.SK_BULLET_01 + 1}`, desc: `동시 발사수 개수 +1 증가 (총 ${skills.SK_BULLET_01 + 1}발 발사)` });
        if (skills.SK_BULLET_02 < 5 && skills.EV_WEAPON_02 === 0) availablePool.push({ id: 'SK_BULLET_02', name: `레이저 빔 Lv.${skills.SK_BULLET_02 + 1}`, desc: `전방 지속 정면 레이저 대미지 계수 +30% 증가` });
        if (skills.SK_BUFF_01 < 5) availablePool.push({ id: 'SK_BUFF_01', name: `과부하 체인 Lv.${skills.SK_BUFF_01 + 1}`, desc: `적 격추 시 전기가 사방으로 연쇄 전이될 확률 +5% 상승` });
        if (skills.SK_BUFF_02 < 3) availablePool.push({ id: 'SK_BUFF_02', name: `플라즈마 실드 Lv.${skills.SK_BUFF_02 + 1}`, desc: `적 탄환을 파쇄하는 아군 회전 배리어 방어막 지속시간 및 궤도 확장` });

        // Backup card if pool empty
        if (availablePool.length === 0) {
            availablePool.push({ id: 'HEAL', name: '정비 보수', desc: '기체 내구도를 즉시 50% 회복합니다.' });
        }

        // Pick up to 3 random cards
        let shuffled = availablePool.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        shuffled.forEach(item => {
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-title">${item.name}</div>
                <div class="card-desc">${item.desc}</div>
            `;
            card.onclick = () => selectSkill(item.id);
            cardList.appendChild(card);
        });
    }

    function selectSkill(id) {
        if (id === 'HEAL') {
            player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.5);
        } else {
            skills[id]++;
        }
        
        // Hide Modal & Resume
        levelModal.style.display = 'none';
        gameState = 'PLAY';
    }

    // Trigger Death & Garage Loop
    function triggerGameOver() {
        gameState = 'GAMEOVER';
        meta.gold += goldEarned;
        totalGoldDisplay.innerText = `${goldEarned} G 획득 (보유: ${meta.gold} G)`;
        
        // Update Shop Buttons Text
        document.getElementById('lvl-atk').innerText = `Lv.${meta.atkLevel}`;
        document.getElementById('lvl-hp').innerText = `Lv.${meta.hpLevel}`;
        document.getElementById('btn-buy-atk').innerText = `${Math.floor(500 * Math.pow(meta.atkLevel, 1.5))} G`;
        document.getElementById('btn-buy-hp').innerText = `${Math.floor(400 * Math.pow(meta.hpLevel, 1.4))} G`;
        
        gameoverScreen.style.display = 'flex';
    }

    window.buyMeta = function(type) {
        if (type === 'atk') {
            let cost = Math.floor(500 * Math.pow(meta.atkLevel, 1.5));
            if (meta.gold >= cost) {
                meta.gold -= cost;
                meta.atkLevel++;
            }
        } else if (type === 'hp') {
            let cost = Math.floor(400 * Math.pow(meta.hpLevel, 1.4));
            if (meta.gold >= cost) {
                meta.gold -= cost;
                meta.gold -= cost;
                meta.hpLevel++;
            }
        }
        // Refresh text
        triggerGameOver();
    };

    window.restartGame = function() {
        gameoverScreen.style.display = 'none';
        initPlayerStats();
        gameState = 'PLAY';
    };

    // --- MAIN ENGINE LOOP ---
    function update(now) {
        if (gameState === 'PLAY') {
            // Wave Spawner
            if (now - lastSpawn > spawnInterval) {
                spawnEnemy();
                lastSpawn = now;
            }

            handlePlayerCombat(now);
            shieldAngle += 0.04;

            // Bullets movement & lifetime
            playerBullets.forEach((b, index) => {
                if (b.type === 'MISSILE' || b.type === 'CLUSTER') {
                    b.x += b.vx;
                    b.y += b.vy;
                    // simple tracking correction if enemy exists
                    if (enemies.length > 0) {
                        b.vx += Math.sign(enemies[0].x - b.x) * 0.2;
                    }
                }
                // laser is instantly updated/drawn from player pos, expired instantly
                if (b.type === 'BASE_LASER' || b.type === 'PRISM_LASER') {
                    playerBullets.splice(index, 1);
                } else if (b.y < -20 || b.x < 0 || b.x > canvas.width) {
                    playerBullets.splice(index, 1);
                }
            });

            // Enemy processing
            enemies.forEach((e, eIdx) => {
                e.y += e.speed;
                
                // Enemy firing
                if (now - e.lastShot > e.shotInterval) {
                    enemyBullets.push({ x: e.x, y: e.y + 15, radius: 5, vy: 3 });
                    e.lastShot = now;
                }

                // Collision with player bullets
                playerBullets.forEach((b, bIdx) => {
                    let dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if (dist < (e.width/2 + 10)) {
                        e.hp -= b.damage;
                        playerBullets.splice(bIdx, 1);

                        // E1: Cluster split trigger
                        if (b.type === 'CLUSTER') {
                            for (let d = 0; d < 4; d++) {
                                let angle = (Math.PI / 2) + (d - 1.5) * 0.4;
                                playerBullets.push({ x: b.x, y: b.y, type: 'MISSILE', damage: b.damage * 0.4, vx: Math.cos(angle) * 4, vy: -Math.sin(angle) * 4 });
                            }
                        }

                        // FX particles
                        for (let p=0; p<5; p++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, radius: Math.random()*3+1, color: '#ff4757', alpha: 1 });
                    }
                });

                // Check death
                if (e.hp <= 0) {
                    // Earn Gold & XP
                    let goldGained = e.type === 'BOMBER' ? 50 : 20;
                    goldEarned += goldGained;
                    player.xp += e.type === 'BOMBER' ? 40 : 25;
                    
                    // Trigger Chain Overload buff check
                    if (skills.SK_BUFF_01 > 0 && Math.random() < (0.05 + skills.SK_BUFF_01 * 0.05)) {
                        enemies.forEach(otherE => {
                            if(otherE.id !== e.id && Math.hypot(otherE.x - e.x, otherE.y - e.y) < 150) {
                                otherE.hp -= player.baseAtk * 1.5; // Zap damage
                            }
                        });
                    }

                    enemies.splice(eIdx, 1);
                    score += 10;
                }

                // Reach screen bottom
                if (e.y > canvas.height + 40) {
                    enemies.splice(eIdx, 1);
                }
            });

            // Enemy Bullets movement
            enemyBullets.forEach((eb, ebIdx) => {
                eb.y += eb.vy;

                // Shield intercept check
                if (skills.SK_BUFF_02 > 0) {
                    let shieldX = player.x + Math.cos(shieldAngle) * 50;
                    let shieldY = player.y + Math.sin(shieldAngle) * 50;
                    if (Math.hypot(eb.x - shieldX, eb.y - shieldY) < 22) {
                        enemyBullets.splice(ebIdx, 1);
                        return;
                    }
                }

                // Hit player
                let distToPlayer = Math.hypot(eb.x - player.x, eb.y - player.y);
                if (distToPlayer < (player.width / 2 + eb.radius)) {
                    player.hp -= 10; // Spec spec: -10 HP
                    enemyBullets.splice(ebIdx, 1);
                    if (player.hp <= 0) triggerGameOver();
                }

                if (eb.y > canvas.height + 20) enemyBullets.splice(ebIdx, 1);
            });

            // Particles update
            particles.forEach((p, pIdx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;
                if (p.alpha <= 0) particles.splice(pIdx, 1);
            });

            // Level up checker
            if (player.xp >= player.nextXp) {
                player.xp -= player.nextXp;
                player.nextXp = Math.floor(player.nextXp * 1.2);
                triggerLevelUp();
            }

            // Sync HTML Bars
            xpBar.style.width = `${(player.xp / player.nextXp) * 100}%`;
            bossBar.style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
        }

        // --- RENDER DESIGN TECH SPEC ---
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Starry Vector Background Lines
        ctx.strokeStyle = '#111a2e';
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }

        // 2. Render Shield if Active
        if (gameState === 'PLAY' && skills.SK_BUFF_02 > 0) {
            ctx.beginPath();
            let shieldX = player.x + Math.cos(shieldAngle) * 50;
            let shieldY = player.y + Math.sin(shieldAngle) * 50;
            ctx.arc(shieldX, shieldY, 12, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 255, 204, 0.6)';
            ctx.fill();
            ctx.strokeStyle = '#00ffcc';
            ctx.stroke();
        }

        // 3. Render Player (Astral Core Spec: White body, Forward wings, Neon Cyan trim)
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 3;
        
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - 20); // Nose
        ctx.lineTo(player.x - 22, player.y + 15); // Left wing forward edge
        ctx.lineTo(player.x - 10, player.y + 8);  // Inner wing body
        ctx.lineTo(player.x, player.y + 18);  // Tail center
        ctx.lineTo(player.x + 10, player.y + 8);
        ctx.lineTo(player.x + 22, player.y + 15); // Right wing forward edge
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Engine core glow
        ctx.beginPath();
        ctx.arc(player.x, player.y + 2, 6, 0, Math.PI*2);
        ctx.fillStyle = '#00ffcc';
        ctx.fill();

        // 4. Render Enemies (Vector solid styled, Neon red/orange highlights)
        enemies.forEach(e => {
            if (e.type === 'BOMBER') {
                ctx.fillStyle = '#2c1318';
                ctx.strokeStyle = '#ff4757'; // Bomber neon red spec
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(e.x, e.y + 20);
                ctx.lineTo(e.x - 28, e.y - 15);
                ctx.lineTo(e.x, e.y - 5);
                ctx.lineTo(e.x + 28, e.y - 15);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            } else {
                // Scout Drone (Triangle stingray spec)
                ctx.fillStyle = '#1c2430';
                ctx.strokeStyle = '#ff9f43'; // Scout neon orange spec
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(e.x, e.y + 15);
                ctx.lineTo(e.x - 18, e.y - 15);
                ctx.lineTo(e.x + 18, e.y - 15);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            }
        });

        // 5. Render Player Bullets / Lasers (Neon Mint glow)
        playerBullets.forEach(b => {
            if (b.type === 'BASE_LASER' || b.type === 'PRISM_LASER') {
                ctx.strokeStyle = b.type === 'PRISM_LASER' ? '#ffffff' : '#00ffcc';
                ctx.lineWidth = b.width;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffcc';
                ctx.beginPath();
                ctx.moveTo(b.x, b.y);
                ctx.lineTo(b.x, 0); // Straight full laser beam line
                ctx.stroke();
                ctx.shadowBlur = 0; // Reset glow
            } else {
                ctx.fillStyle = b.type === 'CLUSTER' ? '#ffffff' : '#00ffcc';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.type === 'CLUSTER' ? 7 : 4, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // 6. Render Enemy Bullets (Perfect Spheres, Red/Yellow gradient)
        enemyBullets.forEach(eb => {
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(eb.x, eb.y, eb.radius, 0, Math.PI * 2);
            ctx.fill();
        });

        // 7. Render Particle bursts
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
        });

        requestAnimationFrame(update);
    }

    // Launch game core loop
    initPlayerStats();
    requestAnimationFrame(update);
</script>

</body>
</html>
