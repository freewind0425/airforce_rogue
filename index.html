<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Project Airforce Rogue - V3 Giant Battlefield</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #02060c;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #ffffff;
        }
        /* 기존 480px 제한을 풀고 화면을 대폭 확장 (가로 960px, 세로 1000px급 스케일 확보) */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 960px;
            margin: 0 auto;
            background-color: #050b14;
            border-left: 2px solid #1a2638;
            border-right: 2px solid #1a2638;
            overflow: hidden;
        }
        /* HUD UI 확장 */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 25px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(5,11,20,1) 60%, rgba(5,11,20,0));
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        #stage-info {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
        }
        #stage-progress-text {
            font-size: 14px;
            color: #8a9fc4;
            font-weight: bold;
        }
        #progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: #111622;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #1f293d;
            margin-bottom: 10px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff9f43, #ff4757);
        }
        #xp-bar-container {
            width: 100%;
            height: 8px;
            background-color: #111622;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #1f293d;
        }
        #xp-bar {
            width: 0%;
            height: 100%;
            background-color: #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
        }
        /* 인게임 스킬 상태판 */
        #skill-status-panel {
            position: absolute;
            top: 110px;
            right: 20px;
            z-index: 9;
            background: rgba(11, 22, 42, 0.85);
            border: 2px solid #1f293d;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        .status-name { color: #8a9fc4; }
        .status-lvl { color: #00ffcc; font-weight: bold; }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 모달 시스템 */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 8, 16, 0.92);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .modal-title {
            font-size: 28px;
            font-weight: 900;
            color: #00ffcc;
            margin-bottom: 8px;
            text-align: center;
        }
        .timer-notice {
            font-size: 15px;
            color: #ff9f43;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background-color: #0f1b30;
            border: 2px solid #233554;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 18px;
            cursor: pointer;
            transition: transform 0.1s ease, border-color 0.1s ease;
        }
        .card:hover {
            border-color: #00ffcc;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.5;
        }

        .gold-display {
            font-size: 36px;
            font-weight: bold;
            color: #ffd32a;
            margin-bottom: 20px;
        }
        .stats-shop {
            width: 100%;
            max-width: 420px;
            margin-bottom: 30px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f1b30;
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #1f293d;
        }
        .shop-name { font-size: 15px; font-weight: bold; }
        .shop-level { font-size: 12px; color: #8a9fc4; margin-top: 4px; display: block;}
        .btn-upgrade {
            background-color: #ffd32a;
            color: #02060c;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-upgrade:disabled {
            background-color: #4b5563;
            color: #9ca3af;
            cursor: not-allowed;
        }
        .btn-action {
            width: 260px;
            height: 54px;
            background-color: #00ffcc;
            color: #02060c;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- HUD -->
    <div id="hud">
        <div class="hud-row">
            <div id="stage-info">STAGE 1</div>
            <div id="stage-progress-text">킬 진행도: 0 / 15</div>
        </div>
        <div id="progress-bar-container"><div id="progress-bar"></div></div>
        <div id="xp-bar-container"><div id="xp-bar"></div></div>
    </div>

    <!-- 스킬 상태 창 -->
    <div id="skill-status-panel">
        <div class="status-item"><span class="status-name">기본미사일</span><span class="status-lvl" id="st-m">Lv.1</span></div>
        <div class="status-item"><span class="status-name">레이저빔</span><span class="status-lvl" id="st-l">Lv.0</span></div>
        <div class="status-item"><span class="status-name">과부하체인</span><span class="status-lvl" id="st-c">Lv.0</span></div>
        <div class="status-item"><span class="status-name">플라즈마실드</span><span class="status-lvl" id="st-s">Lv.0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- 레벨업 선택 모달 -->
    <div id="level-modal" class="modal">
        <div class="modal-title">전투 강화 스킬 획득</div>
        <div class="timer-notice" id="level-timer">자동 선택까지 5초 남음</div>
        <div id="card-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <!-- 게임오버 / 메타 상점 모달 -->
    <div id="gameover-screen" class="modal">
        <div class="modal-title" style="color: #ff4757;">기체 파손 정산</div>
        <div class="timer-notice" id="gameover-timer">자동 재출격까지 5초 남음</div>
        <div class="gold-display" id="total-gold">0 G</div>
        
        <div class="stats-shop">
            <div class="shop-item">
                <div><span class="shop-name">공격력 강화 (+5)</span><span class="shop-level" id="lvl-atk">Lv.1</span></div>
                <button class="btn-upgrade" id="btn-buy-atk" onclick="buyMeta('atk')">500 G</button>
            </div>
            <div class="shop-item">
                <div><span class="shop-name">최대 내구도 (+50)</span><span class="shop-level" id="lvl-hp">Lv.1</span></div>
                <button class="btn-upgrade" id="btn-buy-hp" onclick="buyMeta('hp')">400 G</button>
            </div>
        </div>
        <button class="btn-action" onclick="restartGame()">즉시 재출격</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI 요소 매핑
    const xpBar = document.getElementById('xp-bar');
    const progressBar = document.getElementById('progress-bar');
    const stageInfo = document.getElementById('stage-info');
    const stageProgressText = document.getElementById('stage-progress-text');
    const levelModal = document.getElementById('level-modal');
    const cardList = document.getElementById('card-list');
    const levelTimerView = document.getElementById('level-timer');
    const gameoverScreen = document.getElementById('gameover-screen');
    const gameoverTimerView = document.getElementById('gameover-timer');
    const totalGoldDisplay = document.getElementById('total-gold');

    function resize() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // GAME 시스템 설정
    let gameState = 'PLAY'; 
    let stage = 1;
    let stageKills = 0;
    let killsRequired = 15;
    let goldEarned = 0;
    
    let modalTimer = null;
    let modalSecondsLeft = 5;

    // 메타 업그레이드 데이터 및 초기 자금 지급
    let meta = { atkLevel: 1, hpLevel: 1, gold: 1000 };

    // 4배 커진 전장에 부합하게 기체 규격 스케일업 적용 (기체 폭 45 -> 90)
    let player = {
        x: canvas.width / 2,
        y: canvas.height - 250,
        targetX: canvas.width / 2,
        targetY: canvas.height - 250,
        width: 90,
        height: 84,
        hp: 100,
        maxHp: 100,
        xp: 0,
        nextXp: 100,
        baseAtk: 15,
        atkSpeed: 240,
        lastShot: 0
    };

    let skills = { SK_M: 1, SK_L: 0, SK_C: 0, SK_S: 0, EV_M: 0, EV_L: 0 };

    let playerBullets = [];
    let enemies = [];
    let enemyBullets = [];
    let particles = [];
    let chainLightnings = [];
    let shieldAngle = 0;

    // 드래그/마우스 연동 좌표 보정
    canvas.addEventListener('mousemove', (e) => {
        let rect = canvas.getBoundingClientRect();
        player.targetX = e.clientX - rect.left;
        player.targetY = e.clientY - rect.top;
    });
    canvas.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0) {
            let rect = canvas.getBoundingClientRect();
            player.targetX = e.touches[0].clientX - rect.left;
            player.targetY = e.touches[0].top - rect.top;
        }
    });

    function initRun() {
        player.maxHp = 100 + (meta.hpLevel - 1) * 50;
        player.hp = player.maxHp;
        player.baseAtk = 15 + (meta.atkLevel - 1) * 5;
        player.x = canvas.width / 2;
        player.y = canvas.height - 250;
        player.targetX = player.x;
        player.targetY = player.y;
        player.xp = 0;
        player.nextXp = 100;
        
        stage = 1;
        stageKills = 0;
        killsRequired = 15;
        goldEarned = 0;

        skills = { SK_M: 1, SK_L: 0, SK_C: 0, SK_S: 0, EV_M: 0, EV_L: 0 };
        playerBullets = [];
        enemies = [];
        enemyBullets = [];
        particles = [];
        chainLightnings = [];
        updateStatusPanel();
    }

    function updateStatusPanel() {
        document.getElementById('st-m').innerText = skills.EV_M ? '진화' : `Lv.${skills.SK_M}`;
        document.getElementById('st-l').innerText = skills.EV_L ? '진화' : `Lv.${skills.SK_L}`;
        document.getElementById('st-c').innerText = `Lv.${skills.SK_C}`;
        document.getElementById('st-s').innerText = `Lv.${skills.SK_S}`;
        stageInfo.innerText = `STAGE ${stage}`;
        stageProgressText.innerText = `킬 진행도: ${stageKills} / ${killsRequired}`;
        progressBar.style.width = `${(stageKills / killsRequired) * 100}%`;
        xpBar.style.width = `${(player.xp / player.nextXp) * 100}%`;
    }

    // 신규 적 개체 생성 AI 패키지 (사방 기습, 원거리 포격 패턴, 가로 횡단 패스 패턴 융합)
    let lastSpawn = 0;
    let spawnInterval = 800;

    function spawnEnemyUnit() {
        if (gameState !== 'PLAY') return;
        
        let dice = Math.random();
        let startX, startY, vx, vy, patternType;
        let isBomber = Math.random() > 0.75;
        
        // 4배 커진 전장에 맞춰 적 기체 사이즈도 비례 스케일업 (기존 32 -> 64, 대형 48 -> 96)
        let width = isBomber ? 96 : 64;
        let height = isBomber ? 80 : 64;

        if (dice < 0.4) {
            // 패턴 A: 원거리 포격형 (상단에서 내려와 특정 Y라인에서 대기하며 지속 사격)
            startX = Math.random() * (canvas.width - width) + width/2;
            startY = -50;
            vx = (Math.random() - 0.5) * 0.8;
            vy = 1.8;
            patternType = 'ARTILLERY';
        } else if (dice < 0.7) {
            // 패턴 B: 가로 횡단 횡스크롤 패스 (좌/우 사이드에서 등장하여 화면을 가로질러 지나침)
            let leftSide = Math.random() > 0.5;
            startX = leftSide ? -50 : canvas.width + 50;
            startY = Math.random() * (canvas.height * 0.5) + 100;
            vx = leftSide ? (Math.random() * 1.5 + 1.5) : -(Math.random() * 1.5 + 1.5);
            vy = (Math.random() - 0.5) * 0.6;
            patternType = 'CROSSING';
        } else {
            // 패턴 C: 하단 돌파 습격형
            startX = Math.random() * (canvas.width - width) + width/2;
            startY = -50;
            vx = (Math.random() - 0.5) * 1.2;
            vy = isBomber ? 1.2 : 2.5;
            patternType = 'ASSAULT';
        }

        enemies.push({
            id: Math.random().toString(),
            x: startX,
            y: startY,
            vx: vx,
            vy: vy,
            width: width,
            height: height,
            hp: isBomber ? 60 + stage * 30 : 20 + stage * 10,
            type: isBomber ? 'BOMBER' : 'SCOUT',
            pattern: patternType,
            lastShot: 0,
            shotInterval: isBomber ? 1200 : 2000,
            stopY: Math.random() * 250 + 150 // 포격형이 멈춰설 Y 좌표 지정
        });
    }

    function fireWeapons() {
        // 유도 미사일 & 대형 분열 클러스터 탄환 발사 수치 튜닝
        if (skills.EV_M > 0) {
            playerBullets.push({ x: player.x, y: player.y - 30, type: 'CLUSTER', damage: player.baseAtk * 2.5, vx: 0, vy: -8 });
        } else {
            let count = skills.SK_M;
            for (let i = 0; i < count; i++) {
                let spreadX = (i - (count - 1) / 2) * 25; // 와이드 배치를 위한 간격 확장
                playerBullets.push({ x: player.x + spreadX, y: player.y - 20, type: 'MISSILE', damage: player.baseAtk, vx: spreadX * 0.05, vy: -7.5 });
            }
        }

        // 레이저 빔 FX 투사 플래그 인스턴스화
        if (skills.EV_L > 0) {
            playerBullets.push({ x: player.x, y: player.y - 40, type: 'PRISM_LASER', damage: player.baseAtk * 0.6 });
        } else if (skills.SK_L > 0) {
            playerBullets.push({ x: player.x, y: player.y - 30, type: 'BASE_LASER', damage: player.baseAtk * (0.8 + skills.SK_L * 0.2) * 0.25 });
        }
    }

    function triggerLevelUp() {
        gameState = 'LEVEL_UP';
        levelModal.style.display = 'flex';
        cardList.innerHTML = '';
        
        let pool = [];
        if (skills.SK_M === 5 && skills.SK_C >= 1 && skills.EV_M === 0) pool.push({ id: 'EV_M', name: '★진화★ 클러스터 미사일', desc: '유도탄이 폭발 분열하는 거대 클러스터탄으로 상시 변환!' });
        if (skills.SK_L === 5 && skills.SK_M >= 1 && skills.EV_L === 0) pool.push({ id: 'EV_L', name: '★진화★ 프리즘 레이저', desc: '초고압 광폭 관통 레이저 발사. 격추 시 주변 적에게 연쇄 전격 파편 도탄!' });

        if (skills.SK_M < 5 && skills.EV_M === 0) pool.push({ id: 'SK_M', name: `유도 미사일 Lv.${skills.SK_M+1}`, desc: `동시 유도 미사일 투사 수 다발 추가` });
        if (skills.SK_L < 5 && skills.EV_L === 0) pool.push({ id: 'SK_L', name: `레이저 빔 Lv.${skills.SK_L+1}`, desc: `전방 라인을 완전히 관통 파괴하는 플라즈마 광선 활성화` });
        if (skills.SK_C < 5) pool.push({ id: 'SK_C', name: `과부하 체인 Lv.${skills.SK_C+1}`, desc: `적 처치 시 전격 체인이 발동하여 주변 드론에게 전이 대미지` });
        if (skills.SK_S < 3) pool.push({ id: 'SK_S', name: `플라즈마 실드 Lv.${skills.SK_S+1}`, desc: `기체 주변 방어 궤도 반경을 돌며 적 탄환을 즉시 격추` });

        if(pool.length === 0) pool.push({ id: 'HEAL', name: '긴급 내구도 수리', desc: '기체 장갑을 즉시 40% 복구합니다.' });

        let randomCards = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        randomCards.forEach((c) => {
            let cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.innerHTML = `<div class="card-title">${c.name}</div><div class="card-desc">${c.desc}</div>`;
            cardDiv.onclick = () => selectSkill(c.id);
            cardList.appendChild(cardDiv);
        });

        modalSecondsLeft = 5;
        levelTimerView.innerText = `자동 선택까지 ${modalSecondsLeft}초 남음`;
        
        clearInterval(modalTimer);
        modalTimer = setInterval(() => {
            modalSecondsLeft--;
            levelTimerView.innerText = `자동 선택까지 ${modalSecondsLeft}초 남음`;
            if(modalSecondsLeft <= 0) {
                clearInterval(modalTimer);
                selectSkill(randomCards[0].id);
            }
        }, 1000);
    }

    function selectSkill(id) {
        clearInterval(modalTimer);
        if (id === 'HEAL') {
            player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.4);
        } else {
            skills[id]++;
        }
        levelModal.style.display = 'none';
        gameState = 'PLAY';
        updateStatusPanel();
    }

    function triggerGameOver() {
        gameState = 'GAMEOVER';
        meta.gold += goldEarned;
        totalGoldDisplay.innerText = `${goldEarned} G 정산완료 (현재 잔고: ${meta.gold} G)`;
        
        document.getElementById('lvl-atk').innerText = `Lv.${meta.atkLevel}`;
        document.getElementById('lvl-hp').innerText = `Lv.${meta.hpLevel}`;
        
        let atkCost = Math.floor(500 * Math.pow(meta.atkLevel, 1.5));
        let hpCost = Math.floor(400 * Math.pow(meta.hpLevel, 1.4));
        
        document.getElementById('btn-buy-atk').innerText = `${atkCost} G`;
        document.getElementById('btn-buy-hp').innerText = `${hpCost} G`;
        
        document.getElementById('btn-buy-atk').disabled = meta.gold < atkCost;
        document.getElementById('btn-buy-hp').disabled = meta.gold < hpCost;
        
        gameoverScreen.style.display = 'flex';

        modalSecondsLeft = 5;
        gameoverTimerView.innerText = `자동 재출격까지 ${modalSecondsLeft}초 남음`;
        
        clearInterval(modalTimer);
        modalTimer = setInterval(() => {
            modalSecondsLeft--;
            gameoverTimerView.innerText = `자동 재출격까지 ${modalSecondsLeft}초 남음`;
            if (modalSecondsLeft <= 0) {
                clearInterval(modalTimer);
                restartGame();
            }
        }, 1000);
    }

    // ★ 크리티컬 버그 수정: 골드가 차감되지 않고 오히려 증가하던 로직 완벽 교정
    window.buyMeta = function(type) {
        if(type === 'atk') {
            let cost = Math.floor(500 * Math.pow(meta.atkLevel, 1.5));
            if(meta.gold >= cost) { 
                meta.gold -= cost; // 증가가 아닌 명확한 차감 연산 처리 확인
                meta.atkLevel++; 
            }
        } else {
            let cost = Math.floor(400 * Math.pow(meta.hpLevel, 1.4));
            if(meta.gold >= cost) { 
                meta.gold -= cost; 
                meta.hpLevel++; 
            }
        }
        triggerGameOver(); // 상점 UI 잔액 갱신 처리 리로드
    }

    window.restartGame = function() {
        clearInterval(modalTimer);
        gameoverScreen.style.display = 'none';
        initRun();
        gameState = 'PLAY';
    }

    // MAIN LOOP ENGINE
    function loop(now) {
        if (gameState === 'PLAY') {
            if (now - lastSpawn > spawnInterval) {
                spawnEnemyUnit();
                lastSpawn = now;
            }

            // 기체 이동 보정
            player.x += (player.targetX - player.x) * 0.12;
            player.y += (player.targetY - player.y) * 0.12;
            player.x = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x));
            player.y = Math.max(120, Math.min(canvas.height - player.height/2 - 20, player.y));

            if (now - player.lastShot > player.atkSpeed) {
                fireWeapons();
                player.lastShot = now;
            }

            shieldAngle += 0.04;

            // 아군 투사체 연산
            playerBullets.forEach((b, idx) => {
                if(b.type === 'MISSILE' || b.type === 'CLUSTER') {
                    b.x += b.vx; b.y += b.vy;
                    if(enemies.length > 0 && b.type === 'MISSILE') {
                        b.vx += Math.sign(enemies[0].x - b.x) * 0.25;
                    }
                    if(b.y < -50 || b.x < -50 || b.x > canvas.width + 50) playerBullets.splice(idx, 1);
                } else {
                    // 관통 레이저 충돌 루프
                    enemies.forEach(e => {
                        if(Math.abs(e.x - b.x) < e.width/2 + 15 && e.y < player.y) {
                            e.hp -= b.damage;
                            if(Math.random() > 0.8) particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, radius: Math.random()*3+1, color: '#00ffcc', alpha: 1 });
                        }
                    });
                    playerBullets.splice(idx, 1);
                }
            });

            // 적 유닛 고도화 행동 패턴 연산
            enemies.forEach((e, eIdx) => {
                if (e.pattern === 'ARTILLERY') {
                    // 원거리 포격형은 일정 Y선에 안착하면 정지 후 횡무빙만 침
                    if (e.y < e.stopY) {
                        e.y += e.vy;
                    } else {
                        e.x += e.vx;
                        if(e.x < e.width/2 || e.x > canvas.width - e.width/2) e.vx *= -1;
                    }
                } else {
                    // 일반 주행 및 가로 지르기 패턴
                    e.x += e.vx;
                    e.y += e.vy;
                }

                // 적 포탄 발사 패턴 적용 (4배 넓은 맵 대응)
                if(now - e.lastShot > e.shotInterval) {
                    if (e.pattern === 'ARTILLERY') {
                        // 포격형은 3방향 부채꼴 탄막 조사
                        enemyBullets.push({ x: e.x, y: e.y + e.height/2, vx: -1, vy: 4 });
                        enemyBullets.push({ x: e.x, y: e.y + e.height/2, vx: 0, vy: 4.5 });
                        enemyBullets.push({ x: e.x, y: e.y + e.height/2, vx: 1, vy: 4 });
                    } else {
                        enemyBullets.push({ x: e.x, y: e.y + e.height/2, vx: 0, vy: 3.8 });
                    }
                    e.lastShot = now;
                }

                // 탄환 피격 체크
                playerBullets.forEach((b, bIdx) => {
                    if(b.type === 'MISSILE' || b.type === 'CLUSTER') {
                        if (Math.hypot(b.x - e.x, b.y - e.y) < (e.width/2 + 10)) {
                            e.hp -= b.damage;
                            playerBullets.splice(bIdx, 1);

                            if(b.type === 'CLUSTER') {
                                for(let d=0; d<4; d++) {
                                    let angle = (Math.PI/2) + (d - 1.5) * 0.45;
                                    playerBullets.push({ x: b.x, y: b.y, type: 'MISSILE', damage: b.damage * 0.4, vx: Math.cos(angle)*5, vy: -Math.sin(angle)*5 });
                                }
                            }
                            for(let p=0; p<5; p++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, radius: Math.random()*3+2, color: '#ff4757', alpha: 1 });
                        }
                    }
                });

                // 파괴 및 체인 라이트닝 전이
                if (e.hp <= 0) {
                    let reward = e.type === 'BOMBER' ? 80 : 35;
                    goldEarned += reward;
                    player.xp += e.type === 'BOMBER' ? 40 : 25;
                    stageKills++;

                    if (skills.SK_C > 0) {
                        let prob = 0.15 + (skills.SK_C * 0.08);
                        if (Math.random() < prob) {
                            let targets = [];
                            enemies.forEach(o => {
                                if (o.id !== e.id && Math.hypot(o.x - e.x, o.y - e.y) < 250) targets.push(o);
                            });
                            targets.slice(0, 3).forEach(t => {
                                t.hp -= (player.baseAtk * (0.8 + skills.SK_C * 0.25));
                                chainLightnings.push({ x1: e.x, y1: e.y, x2: t.x, y2: t.y, alpha: 1.0 });
                            });
                        }
                    }

                    if (skills.EV_L > 0 && Math.random() > 0.4) {
                        enemies.forEach(o => {
                            if(o.id !== e.id && Math.hypot(o.x - e.x, o.y - e.y) < 200) {
                                o.hp -= player.baseAtk * 1.4;
                                chainLightnings.push({ x1: e.x, y1: e.y, x2: o.x, y2: o.y, alpha: 1.0, color: '#ffffff' });
                            }
                        });
                    }

                    enemies.splice(eIdx, 1);
                    updateStatusPanel();
                    return;
                }

                // 기체 다이렉트 패널티 충돌
                if (Math.hypot(e.x - player.x, e.y - player.y) < (player.width/3 + e.width/3)) {
                    player.hp -= 25;
                    enemies.splice(eIdx, 1);
                    if(player.hp <= 0) triggerGameOver();
                    updateStatusPanel();
                }

                // ★ 이탈 조건 수리 완료: 하단 아웃 또는 횡단 돌파 시 플레이어 내구도 명확한 차감 대미지 부여
                if (e.y > canvas.height + 50 || e.x < -100 || e.x > canvas.width + 100) {
                    player.hp -= 15; // 화면 외곽 탈출 드론 감점 패널티 가동
                    enemies.splice(eIdx, 1);
                    if(player.hp <= 0) triggerGameOver();
                    updateStatusPanel();
                }
            });

            // 적 탄환 및 실드 연산
            enemyBullets.forEach((eb, ebIdx) => {
                eb.x += eb.vx || 0;
                eb.y += eb.vy;

                if (skills.SK_S > 0) {
                    let orbitRadius = 80 + skills.SK_S * 10; // 와이드 실드 반경 조정
                    let shieldX = player.x + Math.cos(shieldAngle) * orbitRadius;
                    let shieldY = player.y + Math.sin(shieldAngle) * orbitRadius;
                    if (Math.hypot(eb.x - shieldX, eb.y - shieldY) < (25 + skills.SK_S * 4)) {
                        enemyBullets.splice(ebIdx, 1);
                        return;
                    }
                }

                if (Math.hypot(eb.x - player.x, eb.y - player.y) < (player.width / 3)) {
                    player.hp -= 10;
                    enemyBullets.splice(ebIdx, 1);
                    if (player.hp <= 0) triggerGameOver();
                    updateStatusPanel();
                }

                if (eb.y > canvas.height + 20 || eb.x < -20 || eb.x > canvas.width + 20) enemyBullets.splice(ebIdx, 1);
            });

            chainLightnings.forEach((cl, idx) => {
                cl.alpha -= 0.08;
                if(cl.alpha <= 0) chainLightnings.splice(idx, 1);
            });
            particles.forEach((p, idx) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
                if(p.alpha <= 0) particles.splice(idx, 1);
            });

            if (stageKills >= killsRequired) {
                stage++;
                stageKills = 0;
                killsRequired = Math.floor(killsRequired * 1.3);
                spawnInterval = Math.max(350, spawnInterval - 70);
                updateStatusPanel();
            }

            if (player.xp >= player.nextXp) {
                player.xp -= player.nextXp;
                player.nextXp = Math.floor(player.nextXp * 1.3);
                triggerLevelUp();
                updateStatusPanel();
            }
        }

        // RENDERING
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 테크 배클필드 보드선
        ctx.strokeStyle = '#08111e'; ctx.lineWidth = 1.5;
        for (let i = 0; i < canvas.width; i += 60) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }

        // 번개 이펙트
        chainLightnings.forEach(cl => {
            ctx.strokeStyle = cl.color ? cl.color : 'rgba(255, 159, 67, ' + cl.alpha + ')';
            ctx.lineWidth = cl.color ? 6 : 3;
            ctx.beginPath(); ctx.moveTo(cl.x1, cl.y1);
            let midX = (cl.x1 + cl.x2)/2 + (Math.random()-0.5)*30;
            let midY = (cl.y1 + cl.y2)/2 + (Math.random()-0.5)*30;
            ctx.lineTo(midX, midY); ctx.lineTo(cl.x2, cl.y2); ctx.stroke();
        });

        // 와이드 플라즈마 실드 렌더링
        if (gameState === 'PLAY' && skills.SK_S > 0) {
            let orbitRadius = 80 + skills.SK_S * 10;
            let shieldX = player.x + Math.cos(shieldAngle) * orbitRadius;
            let shieldY = player.y + Math.sin(shieldAngle) * orbitRadius;
            ctx.beginPath(); ctx.arc(shieldX, shieldY, 20 + skills.SK_S * 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(75, 101, 235, 0.4)'; ctx.fill();
            ctx.strokeStyle = '#3867d6'; ctx.lineWidth = 3; ctx.stroke();
        }

        // 아군 탄환 및 수리된 상시 광선 레이저 드로잉
        playerBullets.forEach(b => {
            if (b.type === 'BASE_LASER' || b.type === 'PRISM_LASER') {
                ctx.strokeStyle = b.type === 'PRISM_LASER' ? '#ffffff' : '#00ffcc';
                ctx.lineWidth = b.type === 'PRISM_LASER' ? 32 : 16; // 4배 맵 스케일업 반영 광폭화 레이저
                ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
                ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x, 0); ctx.stroke();
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = b.type === 'CLUSTER' ? '#ff9f43' : '#00ffcc';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.type === 'CLUSTER' ? 12 : 7, 0, Math.PI * 2); ctx.fill();
            }
        });

        // 적 포탄
        enemyBullets.forEach(eb => {
            ctx.fillStyle = '#ff4757'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 7, 0, Math.PI*2); ctx.fill();
        });

        // 적 기체 렌더링
        enemies.forEach(e => {
            ctx.fillStyle = e.type === 'BOMBER' ? '#2d142c' : '#111b29';
            ctx.strokeStyle = e.type === 'BOMBER' ? '#ff4757' : '#ff9f43';
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (e.pattern === 'ARTILLERY') {
                // 포격형은 커스텀 스퀘어 윙 비주얼 적용
                ctx.rect(e.x - e.width/2, e.y - e.height/2, e.width, e.height);
            } else {
                ctx.moveTo(e.x, e.y + e.height/2);
                ctx.lineTo(e.x - e.width/2, e.y - e.height/2);
                ctx.lineTo(e.x + e.width/2, e.y - e.height/2);
            }
            ctx.closePath(); ctx.fill(); ctx.stroke();
        });

        // 파티클
        particles.forEach(p => {
            ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        });

        // 아군 기체 스케일업 드로잉 (4배 맵 최적화 형태변환)
        ctx.fillStyle = '#ffffff'; ctx.lineWidth = 4;
        if (skills.EV_M > 0 || skills.EV_L > 0) {
            ctx.strokeStyle = '#ff4757';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 50);
            ctx.lineTo(player.x - 52, player.y + 20);
            ctx.lineTo(player.x - 64, player.y + 44);
            ctx.lineTo(player.x - 24, player.y + 24);
            ctx.lineTo(player.x, player.y + 48);
            ctx.lineTo(player.x + 24, player.y + 24);
            ctx.lineTo(player.x + 64, player.y + 44);
            ctx.lineTo(player.x + 52, player.y + 20);
            ctx.closePath(); ctx.fill(); ctx.stroke();
        } else if (skills.SK_M >= 3 || skills.SK_L >= 3) {
            ctx.strokeStyle = '#ff9f43';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 44);
            ctx.lineTo(player.x - 48, player.y + 32);
            ctx.lineTo(player.x - 20, player.y + 16);
            ctx.lineTo(player.x, player.y + 36);
            ctx.lineTo(player.x + 20, player.y + 16);
            ctx.lineTo(player.x + 48, player.y + 32);
            ctx.closePath(); ctx.fill(); ctx.stroke();
        } else {
            ctx.strokeStyle = '#00ffcc';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 36);
            ctx.lineTo(player.x - 36, player.y + 24);
            ctx.lineTo(player.x - 16, player.y + 12);
            ctx.lineTo(player.x, player.y + 28);
            ctx.lineTo(player.x + 16, player.y + 12);
            ctx.lineTo(player.x + 36, player.y + 24);
            ctx.closePath(); ctx.fill(); ctx.stroke();
        }

        requestAnimationFrame(loop);
    }

    initRun();
    requestAnimationFrame(loop);
</script>

</body>
