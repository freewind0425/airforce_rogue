<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Project K MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <section id="lobby" class="screen active">
      <div class="title">PROJECT K</div>
      <div class="subtitle">MVP Asset Integration Build</div>
      <div class="ship-preview">
        <img id="lobbyShip" alt="ship preview" />
        <div id="lobbyShipName">FALCON</div>
      </div>
      <div class="lobby-actions">
        <button id="selectFalcon">Falcon</button>
        <button id="selectVulcan">Vulcan</button>
        <button id="startGame" class="primary">START</button>
      </div>
      <div class="note">Assets are loaded from <code>data/asset_manifest.json</code></div>
    </section>

    <section id="game" class="screen">
      <canvas id="gameCanvas"></canvas>
      <div id="hud">
        <div class="top-row">
          <div id="waveHud">
            <img id="wavePanelImg" />
            <div id="waveText">STAGE 1  WAVE 1</div>
          </div>
          <button id="pauseBtn">Ⅱ</button>
        </div>
        <div id="hpHud">
          <img id="hpFrameImg" />
          <div id="hpFillClip"><img id="hpFillImg" /></div>
        </div>
        <div id="expHud">
          <div id="expFillTrack"><div id="expFill"></div></div>
        </div>
        <button id="speedBtn">x1</button>
        <button id="levelUpBtn" disabled>LEVEL UP</button>
      </div>

      <div id="levelUpModal" class="modal hidden">
        <div class="modal-card levelup-card">
          <h2>LEVEL UP</h2>
          <p class="levelup-sub">카드 1개를 선택하세요</p>
          <div id="levelUpCards" class="card-row"></div>
        </div>
      </div>

      <div id="pauseMenu" class="modal hidden">
        <div class="modal-card">
          <h2>PAUSED</h2>
          <button id="resumeBtn">계속하기</button>
          <button id="settleBtn">정산하고 로비로</button>
        </div>
      </div>

      <div id="resultScreen" class="modal hidden">
        <div class="modal-card">
          <h2 id="resultTitle">RESULT</h2>
          <div class="result-row"><span id="resultStage">STAGE 1</span><span id="resultWave">WAVE 1</span></div>
          <div class="result-row"><span id="resultKills">0 KILLS</span><span id="resultTime">00:00</span></div>
          <button id="resultConfirmBtn" class="primary">기지로</button>
        </div>
      </div>
    </section>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
